<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>During Fishing</title>

    <style>
        /* ====== 背景・基本設定 ====== */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url("background.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            color: white;
        }

        /* ====== ヘッダー ====== */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
        }

        .back-btn {
            font-size: 20px;
            cursor: pointer;
        }

        #network-status {
            font-size: 18px;
            font-weight: bold;
        }

        /* ====== メイン ====== */
        .container {
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 40px;
        }

        /* ====== ボタン（共通デザイン） ====== */
        .menu-btn {
            display: block;
            width: 500px;
            max-width: 90%;
            margin: 18px auto;
            padding: 22px;
            font-size: 24px;
            cursor: pointer;
            border: none;
            border-radius: 14px;

            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(40,40,40,0.6));
            color: white;

            box-shadow: 0 6px 15px rgba(0,0,0,0.45);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .menu-btn:hover {
            transform: translateY(-6px) scale(1.05);
            background: rgba(255, 255, 255, 0.28);
            box-shadow: 0 10px 25px rgba(255,255,255,0.35);
        }

        .menu-btn:active {
            transform: scale(0.95);
            box-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }

        /* ====== PC レイアウト（1個 → 2列 × 3段） ====== */
        @media screen and (min-aspect-ratio: 4/3) {

            .single-row {
                margin-bottom: 30px;
            }

            .two-column {
                display: flex;
                justify-content: center;
                gap: 40px;
                margin-bottom: 30px;
            }

            .two-column .menu-btn {
                width: 300px;
                margin: 0;
                padding: 26px;
                font-size: 26px;
            }
        }

        /* ====== スマホ（画面いっぱいの大きいボタン） ====== */
        @media screen and (max-width: 600px) {

            .menu-btn {
                width: 500px;
                max-width: 95%;
                padding: 32px;
                font-size: 30px;
                border-radius: 20px;
                margin: 22px auto;
            }

            h1 {
                font-size: 34px;
            }

            .two-column {
                display: block;
            }

            .two-column .menu-btn {
                width: 95%;
                margin: 22px auto;
            }
        }

        /* ====== 日時＋バッテリー ====== */
        #datetime {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.45);
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* iPhone風バッテリー */
        .battery-icon {
            width: 28px;
            height: 14px;
            border: 2px solid white;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1px;
            box-sizing: border-box;
        }

        .battery-icon::after {
            content: "";
            position: absolute;
            right: -6px;
            top: 3px;
            width: 4px;
            height: 8px;
            background: white;
            border-radius: 2px;
        }

        .battery-level {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease, background 0.3s ease;
        }

        /* ====== ポップアップ ====== */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .popup-box {
            background: rgba(255,255,255,0.95);
            color: black;
            padding: 25px 30px;
            border-radius: 14px;
            width: 300px;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .popup-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            gap: 12px; 
        }

        .popup-buttons button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .popup-buttons button:hover {
            transform: scale(1.08);
        }

        .apple-btn { background: #007aff; color: white; }
        .google-btn { background: #34a853; color: white; }
        .cancel-btn { background: #d9534f; color: white; }

    </style>
</head>

<body>

    <!-- ====== ヘッダー ====== -->
    <div class="header">
        <div class="back-btn" onclick="window.location.href='index.html'">← Home</div>
        <div id="network-status">Network Status: Checking...</div>
    </div>

    <!-- ====== メイン ====== -->
    <div class="container">
        <h1>During Fishing</h1>

        <!-- 1個目 -->
        <div class="single-row">
            <button class="menu-btn" onclick="location.href='Detect_Fish.html'">Detect Fish</button>
        </div>

        <!-- 2列 × 3段 -->
        <div class="two-column">
            <button class="menu-btn" onclick="location.href='Fish_Search.html'">Fish Search</button>
            <button class="menu-btn" onclick="location.href='Fishing_Map.html'">Fishing Map</button>
        </div>

        <div class="two-column">
            <button class="menu-btn" onclick="location.href='Fishing_Guide.html'">Fishing Guide</button>
            <button class="menu-btn" onclick="location.href='Fishing_Record.html'">Fishing Record</button>
        </div>

        <div class="two-column">
            <button class="menu-btn" onclick="openMapPopup()">Open Map</button>
            <button class="menu-btn" onclick="uploadFishing()">Upload your Fishing</button>
        </div>
    </div>

    <!-- ====== 日時＋バッテリー ====== -->
    <div id="datetime"></div>

    <script>
        /* ====== ネットワーク状態 ====== */
        function updateNetworkStatus() {
            const el = document.getElementById("network-status");
            el.textContent = navigator.onLine ? "Network Status: Online" : "Network Status: Offline";
        }
        updateNetworkStatus();
        window.addEventListener("online", updateNetworkStatus);
        window.addEventListener("offline", updateNetworkStatus);

        /* ====== 日時＋バッテリー ====== */
        async function updateDateTime() {
            const dtEl = document.getElementById("datetime");
            const now = new Date();

            const MM = String(now.getMonth() + 1).padStart(2, "0");
            const DD = String(now.getDate()).padStart(2, "0");
            const YYYY = now.getFullYear();
            const HH = String(now.getHours()).padStart(2, "0");
            const mm = String(now.getMinutes()).padStart(2, "0");
            const SS = String(now.getSeconds()).padStart(2, "0");

            const offsetMin = now.getTimezoneOffset();
            const offsetHour = Math.abs(offsetMin / 60);
            const sign = offsetMin <= 0 ? "+" : "-";
            const offsetStr = `UTC${sign}${String(offsetHour).padStart(2, "0")}`;

            let batteryPercent = "N/A";
            let batteryWidth = "0%";
            let batteryColor = "limegreen";

            try {
                const battery = await navigator.getBattery();
                batteryPercent = Math.round(battery.level * 100);
                batteryWidth = batteryPercent + "%";

                if (batteryPercent <= 10) batteryColor = "red";
                else if (batteryPercent <= 30) batteryColor = "yellow";
            } catch {}

            dtEl.innerHTML = `
                ${MM}/${DD}/${YYYY} ${HH}:${mm}:${SS} ${offsetStr}
                <div class="battery-icon">
                    <div class="battery-level" style="width:${batteryWidth}; background:${batteryColor};"></div>
                </div>
                <span>${batteryPercent}%</span>
            `;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        /* ====== 6: Open Map ポップアップ ====== */
        function openMapPopup() {
            const popup = document.createElement("div");
            popup.className = "popup-overlay";

            popup.innerHTML = `
                <div class="popup-box">
                    <p>Which app do you want to open?</p>
                    <div class="popup-buttons">
                        <button class="apple-btn" id="apple">Apple Maps</button>
                        <button class="google-btn" id="google">Google Maps</button>
                        <button class="cancel-btn" id="cancel">Cancel</button>
                    </div>
                </div>
            `;

            document.body.appendChild(popup);

            document.getElementById("apple").onclick = () => {
                popup.remove();
                window.location.href = "https://maps.apple.com/";
            };

            document.getElementById("google").onclick = () => {
                popup.remove();
                window.location.href = "https://maps.google.com/";
            };

            document.getElementById("cancel").onclick = () => {
                popup.remove();
            };
        }

        /* ====== 7: Upload your Fishing ====== */
        function uploadFishing() {
            if (!navigator.onLine) {
                const popup = document.createElement("div");
                popup.className = "popup-overlay";

                popup.innerHTML = `
                    <div class="popup-box">
                        <p>Your device is offline, so you can't</p>
                        <div class="popup-buttons">
                            <button class="cancel-btn" id="ok">OK</button>
                        </div>
                    </div>
                `;

                document.body.appendChild(popup);

                document.getElementById("ok").onclick = () => popup.remove();
            } else {
                window.location.href = "Upload_Fishing.html";
            }
        }
    </script>

</body>
</html>
