<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Device Information</title>

    <script>
        const token = sessionStorage.getItem("device_token");

        if (!token || token.length < 20) {
            window.location.href = "index.html";
        } else {
            sessionStorage.removeItem("device_token");
        }
    </script>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            padding: 40px;
        }
    </style>
</head>
<body>
    <h1>Device Information</h1>
    <p>This is a protected page.</p>
</body>
</html>
