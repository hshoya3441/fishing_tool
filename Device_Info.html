<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Device Information</title>

    <script>
        const token = sessionStorage.getItem("device_token");

        if (!token || token.length < 20) {
            window.location.href = "index.html";
        } else {
            sessionStorage.removeItem("device_token");
        }
    </script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url("background.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            color: white;
            padding: 40px;
        }

        .info-box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
        }

        h1 {
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

<h1>Device Information</h1>

<div class="info-box">
    <p id="os"></p>
    <p id="browser"></p>
    <p id="screen"></p>
    <p id="lang"></p>
    <p id="timezone"></p>
    <p id="battery"></p>
    <p id="online"></p>

    <!-- 追加 -->
    <p id="ip"></p>
    <p id="location"></p>
    <p id="isp"></p>
    <p id="vpn"></p>
    <p id="gps"></p>
    <p id="search"></p>
</div>

<script>
    document.getElementById("os").textContent =
        "OS: " + navigator.platform;

    document.getElementById("browser").textContent =
        "Browser: " + navigator.userAgent;

    document.getElementById("screen").textContent =
        "Screen Size: " + window.innerWidth + " x " + window.innerHeight;

    document.getElementById("lang").textContent =
        "Language: " + navigator.language;

    document.getElementById("timezone").textContent =
        "Time Zone: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

    document.getElementById("online").textContent =
        "Network: " + (navigator.onLine ? "Online" : "Offline");

    navigator.getBattery().then(b => {
        document.getElementById("battery").textContent =
            "Battery: " + Math.round(b.level * 100) + "%";
    });

    // =========================
    // IP / Location / ISP
    // =========================
    fetch("https://ipinfo.io/json?token=YOUR_TOKEN_HERE")
        .then(res => res.json())
        .then(data => {

            document.getElementById("ip").textContent =
                "IP: " + data.ip;

            document.getElementById("location").textContent =
                "Location: " + data.city + ", " + data.region + ", " + data.country;

            document.getElementById("isp").textContent =
                "ISP: " + data.org;

            // VPN / Proxy 推定（簡易）
            let vpn = "Not detected (not guaranteed)";

            if (data.privacy &&
                (data.privacy.vpn || data.privacy.proxy || data.privacy.tor)) {
                vpn = "Likely VPN/Proxy/Tor";
            }

            document.getElementById("vpn").textContent =
                "VPN/Proxy: " + vpn;
        })
        .catch(() => {
            document.getElementById("ip").textContent =
                "IP: Failed to fetch";
        });

    // =========================
    // GPS Location
    // =========================
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                document.getElementById("gps").textContent =
                    "GPS: " + pos.coords.latitude + ", " + pos.coords.longitude;
            },
            err => {
                document.getElementById("gps").textContent =
                    "GPS: Permission denied";
            }
        );
    } else {
        document.getElementById("gps").textContent =
            "GPS: Not supported";
    }

    // =========================
    // Search Engine detection (referrer)
    // =========================
    let ref = document.referrer;
    let searchEngine = "Unknown";

    if (ref.includes("google")) searchEngine = "Google";
    else if (ref.includes("bing")) searchEngine = "Bing";
    else if (ref.includes("yahoo")) searchEngine = "Yahoo";
    else if (ref.includes("duckduckgo")) searchEngine = "DuckDuckGo";
    else if (ref) searchEngine = "Other referrer";

    document.getElementById("search").textContent =
        "Search Engine / Referrer: " + searchEngine;

</script>

</body>
</html>
