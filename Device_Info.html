<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Device Information</title>

<style>
/* ===== 全体レイアウト ===== */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial, sans-serif;
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    color: white;
}

/* ===== 戻るボタン ===== */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
    user-select: none;
}

/* ===== メインボックス ===== */
.info-box {
    background: rgba(0,0,0,0.55);
    padding: 30px 40px;
    border-radius: 15px;
    text-align: center;
    max-width: 90%;
    width: 500px;
}

/* ===== 文字サイズ ===== */
h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

p {
    font-size: 20px;
    margin: 10px 0;
    word-break: break-word;
}

/* ===== スマホ最適化 ===== */
@media (max-width: 600px) {
    .info-box {
        width: 92%;
        padding: 24px;
    }

    h1 {
        font-size: 26px;
    }

    p {
        font-size: 20px; /* ←スマホでかなり見やすく */
        margin: 12px 0;
    }

    .back-btn {
        width: 55px;   /* ←大きく */
        height: 55px;  /* ←大きく */
        font-size: 26px;
        top: 15px;
        left: 15px;
    }
}
</style>
</head>

<body>

<!-- 戻るボタン -->
<div class="back-btn" onclick="location.href='index.html'">←</div>

<div class="info-box">
    <h1>Device Info</h1>

    <p id="os"></p>
    <p id="screen"></p>
    <p id="lang"></p>
    <p id="timezone"></p>
    <p id="network"></p>
    <p id="battery"></p>

    <hr style="opacity:0.3">

    <p id="ip"></p>
    <p id="location"></p>
    <p id="isp"></p>
    <p id="vpn"></p>

    <hr style="opacity:0.3">

    <p id="gps"></p>
    <p id="search"></p>
</div>

<script>

/* ===== OS（簡略版） ===== */
let os = "Unknown";
if (navigator.userAgent.includes("Win")) os = "Windows";
else if (navigator.userAgent.includes("Mac")) os = "macOS";
else if (navigator.userAgent.includes("Android")) os = "Android";
else if (navigator.userAgent.includes("iPhone")) os = "iOS";

document.getElementById("os").textContent = "OS: " + os;

/* ===== ブラウザ（バージョンなし） ===== */
document.getElementById("network").textContent =
    "Browser: " + navigator.userAgent.split(" ")[0];

/* ===== 画面 ===== */
document.getElementById("screen").textContent =
    "Screen: " + window.innerWidth + " x " + window.innerHeight;

/* ===== 言語 ===== */
document.getElementById("lang").textContent =
    "Language: " + navigator.language;

/* ===== タイムゾーン ===== */
document.getElementById("timezone").textContent =
    "Timezone: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

/* ===== バッテリー ===== */
navigator.getBattery?.then(b => {
    document.getElementById("battery").textContent =
        "Battery: " + Math.round(b.level * 100) + "%";
});

/* ===== IP情報 ===== */
fetch("https://ipinfo.io/json?token=YOUR_TOKEN_HERE")
.then(r => r.json())
.then(d => {

    document.getElementById("ip").textContent =
        "IP: " + d.ip;

    document.getElementById("location").textContent =
        "Location: " + d.city + ", " + d.country;

    document.getElementById("isp").textContent =
        "ISP: " + d.org;

    let vpn = "Not detected";
    if (d.privacy && (d.privacy.vpn || d.privacy.proxy || d.privacy.tor)) {
        vpn = "Possible VPN/Proxy";
    }

    document.getElementById("vpn").textContent =
        "VPN: " + vpn;
})
.catch(() => {
    document.getElementById("ip").textContent = "IP: error";
});

/* ===== GPS ===== */
navigator.geolocation?.getCurrentPosition(
pos => {
    document.getElementById("gps").textContent =
        "GPS: " + pos.coords.latitude.toFixed(4) + ", " +
        pos.coords.longitude.toFixed(4);
},
() => {
    document.getElementById("gps").textContent =
        "GPS: denied";
});

/* ===== 検索エンジン（リファラ） ===== */
let ref = document.referrer;
let search = "Unknown";

if (ref.includes("google")) search = "Google";
else if (ref.includes("bing")) search = "Bing";
else if (ref.includes("yahoo")) search = "Yahoo";
else if (ref.includes("duckduckgo")) search = "DuckDuckGo";

document.getElementById("search").textContent =
    "Search: " + search;

</script>

</body>
</html>
